apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  replicas: ${{ values.replicas }}
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
    spec:
      containers:
      - name: ${{ values.name }}
        image: "{% if values.acrName %}${{ values.acrName }}.azurecr.io/${{ values.name }}:latest{% else %}${{ values.dockerImage }}{% endif %}"
        ports:
        - containerPort: ${{ values.applicationPort }}
          name: http
        env:
        - name: PORT
          value: "${{ values.applicationPort }}"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: ${{ values.applicationPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: ${{ values.applicationPort }}
          initialDelaySeconds: 10
          periodSeconds: 5

