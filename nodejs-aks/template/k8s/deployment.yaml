apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.app_name }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.app_name }}
    backstage.io/kubernetes-id: ${{ values.app_name }}

spec:
  replicas: 2
  selector:
    matchLabels:
      app: ${{ values.app_name }}

  template:
    metadata:
      labels:
        app: ${{ values.app_name }}
        backstage.io/kubernetes-id: ${{ values.app_name }}

    spec:
      containers:
        - name: ${{ values.app_name }}
          # image: ${{ values.acr_name }}.azurecr.io/${{ values.app_name }}:latest
          image: ${{ secrets.ACR_NAME }}.azurecr.io/${{ values.app_name }}:latest
          ports:
            - containerPort: 3000