apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aks-nodejs-template
  title: AKS Node.js Deployment
  description: Create and deploy a Node.js app to AKS
spec:
  owner: development
  type: service

  parameters:
    - title: App Information
      required:
        - component_id
        - environment
      properties:
        component_id:
          title: Application Name
          type: string
          pattern: '^[a-z0-9-]+$'
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - qa
            - prod

    - title: Container Configuration
      required:
        - docker_image
      properties:
        docker_image:
          title: Docker Image
          type: string
          default: node:22-alpine
        acr_name:
          title: ACR Name
          type: string
          description: Azure Container Registry name (optional)

    - title: Kubernetes Configuration
      required:
        - namespace
      properties:
        namespace:
          title: Namespace
          type: string
          pattern: '^[a-z0-9-]+$'

    - title: Choose a Location
      required:
        - host
        - owner
        - repo
      properties:
        host:
          type: string
          default: github.com
          enum:
            - github.com
        owner:
          type: string
          default: saagarsvs007
        repo:
          type: string

  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{ parameters.component_id }}
          app_env: ${{ parameters.environment }}
          namespace: ${{ parameters.namespace }}
          docker_image: ${{ parameters.docker_image }}
          acr_name: ${{ parameters.acr_name }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.owner }}&repo=${{ parameters.component_id }}
        description: AKS Node.js service scaffolded from Backstage
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}