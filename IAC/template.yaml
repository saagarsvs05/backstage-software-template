apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-terraform-app
  title: Azure App via Terraform
spec:
  owner: development
  type: service
  parameters:
    - title: App Information
      required:
        - component_id
        - environment
      properties:
        component_id:
          title: Component name
          type: string
          description: Unique name of the component
          pattern: '^([a-zA-Z][a-zA-Z0-9-]*)(-[a-zA-Z0-9]+)*$'
        environment:
          title: Environment
          type: string
          description: The environment the component will be deployed to
          enum:
            - dev
            - qa            
            - prod
    - title: Choose a Location
      required:
        - host
        - owner
        - repo
      properties:
        host:
          title: Git Host
          type: string
          default: github.com
          enum:
              - github.com
        owner:
          title: Owner Name
          type: string
          default: saagarsvs007
          description: Name of the user or organization that will own the repository
        repo:
          title: Repository Name
          type: string
          description: Name of the repository to be created
  # parameters:
  #   - title: App Details
  #     required:
  #       - name
  #     properties:
  #       name:
  #         type: string
  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{ parameters.component_id }}
          app_env: ${{ parameters.environment }}
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.owner }}&repo=${{ parameters.component_id }}
        description: IAC service scaffolded from Backstage
        defaultBranch: 'main'
        repoVisibility: public
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
  # steps:
